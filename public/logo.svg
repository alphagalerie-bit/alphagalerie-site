<svg width="420" height="120" viewBox="0 0 420 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Alpha Galerie</title>
  <desc id="logoDesc">Logotipo da Alpha Galerie em estilo monograma com wordmark premium.</desc>
  <defs>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Circle monogram -->
  <g transform="translate(10 10)">
    <!-- Outer circle -->
    <circle cx="50" cy="50" r="50" fill="#0c0c0c" />
    <!-- Main border -->
    <circle cx="50" cy="50" r="48" fill="none" stroke="#c9a961" stroke-width="2.2" filter="url(#glowEffect)" />
    <!-- Inner guide circle -->
    <circle cx="50" cy="50" r="35" fill="none" stroke="#c9a961" stroke-width="0.8" stroke-opacity="0.15" />
    
    <!-- Letter A - clean geometric -->
    <g>
      <polygon points="50,22 64,55 58,55 55,47 45,47 42,55 36,55" fill="#f4f4f4" />
      <rect x="48" y="40" width="4" height="6" fill="#c9a961" />
    </g>
    
    <!-- Letter G - clean geometric -->
    <g>
      <circle cx="68" cy="50" r="18" fill="none" stroke="#c9a961" stroke-width="3.5" />
      <rect x="68" y="48" width="12" height="5" fill="#c9a961" />
      <circle cx="68" cy="50" r="10" fill="#0c0c0c" />
    </g>
  </g>
  
  <!-- Text group -->
  <g transform="translate(115 30)">
    <text x="0" y="34" fill="#f4f4f4" font-size="36" font-family="Cormorant Garamond, serif" font-weight="600" letter-spacing="0.06em">ALPHA GALERIE</text>
    <text x="0" y="54" fill="#c9a961" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="500" letter-spacing="0.15em">HEADSHOP · CHARUTARIA · ARGUILE</text>
    <line x1="0" y1="64" x2="280" y2="64" stroke="#c9a961" stroke-width="1" stroke-opacity="0.4" />
  </g>
</svg>